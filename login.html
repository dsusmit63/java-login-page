<!DOCTYPE html>
<html>
<head>

<title>Java Login</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.card{
background:white;
padding:40px;
border-radius:12px;
width:320px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#667eea;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#5563d1;
}

#result{
margin-top:10px;
text-align:center;
}

</style>

</head>

<body>

<div class="card">

<h2>Login</h2>

<form id="loginForm">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<p id="result"></p>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit", async function(e){

e.preventDefault();

const formData = new FormData(this);

const res = await fetch("/login",{
method:"POST",
body:new URLSearchParams(formData)
});

const text = await res.text();

document.getElementById("result").innerText = text;

});

</script>

</body>
</html>
